<!DOCTYPE html>
<html>
<head>
<title>Credit Card Fraud Detection</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

.container{
width:500px;
margin:auto;
background:white;
padding:30px;
margin-top:50px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

h1{
color:#333;
}

input,select{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:1px solid gray;
}

button{
padding:12px 20px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>💳 Credit Card Fraud Detection</h1>

<form action="/predict" method="post">

<input type="number" name="amt" placeholder="Transaction Amount" required>

<select name="gender">
<option value="M">Male</option>
<option value="F">Female</option>
</select>

<input type="number" name="city_pop" placeholder="City Population" required>

<input type="text" name="lat" placeholder="Customer Latitude" required>

<input type="text" name="long" placeholder="Customer Longitude" required>

<input type="text" name="merch_lat" placeholder="Merchant Latitude" required>

<input type="text" name="merch_long" placeholder="Merchant Longitude" required>

<input type="number" name="unix_time" placeholder="Unix Time" required>

<button type="submit">Predict Transaction</button>

</form>

<div class="result">
{{ prediction_text }}
</div>

</div>

</body>
</html>
